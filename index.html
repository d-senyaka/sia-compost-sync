<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sia-Compost-Sync Dashboard</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --good: #22c55e;
      --warn: #f59e0b;
    }
    body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }
    .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .card { background: var(--card); padding: 14px; border-radius: 10px; }
    .label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .value { font-size: 22px; font-weight: bold; }
    .controls { display: flex; gap: 10px; margin-top: 16px; margin-bottom: 16px; }
    input { background: #0b1220; color: var(--text); border: 1px solid #334155; border-radius: 8px; padding: 10px 12px; min-width: 260px; }
    button { background: #334155; color: var(--text); border: 0; border-radius: 8px; padding: 10px 14px; cursor: pointer; }
    button:hover { background: #475569; }
    #statusPill { font-weight: 600; color: var(--good); }
    .muted { color: var(--muted); }
    @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌿 Sia-Compost-Sync Dashboard</h1>
    <p class="muted">MQTT topic: <code>sia/compost/data</code> | Commands: <code id="commandTopicView">sia/compost/commands/&lt;device-id&gt;</code></p>
    <p>Connection: <span id="statusPill">Connecting...</span></p>

    <div class="grid">
      <div class="card"><div class="label">Temperature</div><div id="temp" class="value">--</div></div>
      <div class="card"><div class="label">Humidity</div><div id="hum" class="value">--</div></div>
      <div class="card"><div class="label">Methane (raw)</div><div id="methane" class="value">--</div></div>
      <div class="card"><div class="label">AI Status</div><div id="state" class="value">--</div></div>
    </div>

    <div class="controls">
      <input id="deviceIdInput" placeholder="Device ID suffix (12-hex, e.g. a1b2c3d4e5f6)" />
      <input id="commandTokenInput" type="password" placeholder="Optional command token" />
    </div>

    <div class="controls">
      <button id="refreshBtn">📊 Force Refresh</button>
      <button id="resetBtn">🚨 System Reset</button>
    </div>

    <div class="card">
      <canvas id="lineChart" height="100"></canvas>
    </div>
  </div>

  <script>
    const WS_URL = "wss://broker.hivemq.com:8884/mqtt";
    const DATA_TOPIC = "sia/compost/data";
    const COMMAND_TOPIC_PREFIX = "sia/compost/commands/";
    const DEVICE_ID_PATTERN = /^[0-9a-f]{12}$/;
    const MAX_POINTS = 20;

    const params = new URLSearchParams(window.location.search);
    const initialDeviceId = (params.get("device") || localStorage.getItem("sia_device_id") || "").trim().toLowerCase();
    const initialToken = (localStorage.getItem("sia_command_token") || "").trim();

    const deviceIdInput = document.getElementById("deviceIdInput");
    const commandTokenInput = document.getElementById("commandTokenInput");
    const commandTopicView = document.getElementById("commandTopicView");
    deviceIdInput.value = initialDeviceId;
    commandTokenInput.value = initialToken;

    const labels = [];
    const tempSeries = [];
    const humSeries = [];

    const chart = new Chart(document.getElementById("lineChart"), {
      type: "line",
      data: {
        labels,
        datasets: [
          { label: "Temperature", data: tempSeries, borderColor: "#38bdf8", tension: 0.3 },
          { label: "Humidity", data: humSeries, borderColor: "#a78bfa", tension: 0.3 }
        ]
      },
      options: {
        responsive: true,
        animation: false,
        scales: { y: { beginAtZero: true } }
      }
    });

    const statusPill = document.getElementById("statusPill");
    const tempEl = document.getElementById("temp");
    const humEl = document.getElementById("hum");
    const methaneEl = document.getElementById("methane");
    const stateEl = document.getElementById("state");

    function getCommandTopic() {
      const deviceId = deviceIdInput.value.trim().toLowerCase();
      return deviceId ? `${COMMAND_TOPIC_PREFIX}${deviceId}` : "";
    }

    function hasValidDeviceId() {
      return DEVICE_ID_PATTERN.test(deviceIdInput.value.trim().toLowerCase());
    }

    function requireValidCommandTopic() {
      const commandTopic = getCommandTopic();
      if (!commandTopic || !hasValidDeviceId()) {
        alert("Please enter a valid 12-character hex device ID suffix before sending commands.");
        return null;
      }
      return commandTopic;
    }

    function updateCommandTopicView() {
      commandTopicView.textContent = getCommandTopic() || `${COMMAND_TOPIC_PREFIX}<device-id>`;
    }

    function buildCommandPayload(commandName) {
      const token = commandTokenInput.value.trim();
      return token ? `${token}:${commandName}` : commandName;
    }

    updateCommandTopicView();

    deviceIdInput.addEventListener("input", () => {
      updateCommandTopicView();
      localStorage.setItem("sia_device_id", deviceIdInput.value.trim().toLowerCase());
    });

    commandTokenInput.addEventListener("input", () => {
      localStorage.setItem("sia_command_token", commandTokenInput.value.trim());
    });

    function pushPoint(temp, hum) {
      labels.push(new Date().toLocaleTimeString());
      tempSeries.push(temp);
      humSeries.push(hum);
      if (labels.length > MAX_POINTS) {
        labels.shift();
        tempSeries.shift();
        humSeries.shift();
      }
      chart.update();
    }

    const client = mqtt.connect(WS_URL, { clean: true, reconnectPeriod: 2000 });

    client.on("connect", () => {
      statusPill.textContent = "Connected";
      statusPill.style.color = "#22c55e";
      client.subscribe(DATA_TOPIC);
    });

    client.on("reconnect", () => {
      statusPill.textContent = "Reconnecting...";
      statusPill.style.color = "#f59e0b";
    });

    client.on("error", () => {
      statusPill.textContent = "Error";
      statusPill.style.color = "#ef4444";
    });

    client.on("message", (_, payload) => {
      try {
        const d = JSON.parse(payload.toString());
        const temp = Number(d.temp);
        const hum = Number(d.hum);
        const methane = Number(d.methane);
        const status = d.status ?? "Unknown";

        tempEl.textContent = Number.isFinite(temp) ? `${temp.toFixed(2)} °C` : "--";
        humEl.textContent = Number.isFinite(hum) ? `${hum.toFixed(2)} %` : "--";
        methaneEl.textContent = Number.isFinite(methane) ? methane : "--";
        stateEl.textContent = status;

        if (Number.isFinite(temp) && Number.isFinite(hum)) {
          pushPoint(temp, hum);
        }
      } catch (_) {}
    });

    document.getElementById("refreshBtn").addEventListener("click", () => {
      const commandTopic = requireValidCommandTopic();
      if (!commandTopic) {
        return;
      }
      client.publish(commandTopic, buildCommandPayload("REFRESH"));
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      const commandTopic = requireValidCommandTopic();
      if (!commandTopic) {
        return;
      }
      client.publish(commandTopic, buildCommandPayload("RESET"));
    });
  </script>
</body>
</html>
